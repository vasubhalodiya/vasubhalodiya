        <script>
            //Profile round text

            var Emblem = {
                init: function (el, str) {
                    var element = document.querySelector(el);
                    var text = str ? str : element.innerHTML;
                    element.innerHTML = '';
                    for (var i = 0; i < text.length; i++) {
                        var letter = text[i];
                        var span = document.createElement('span');
                        var node = document.createTextNode(letter);
                        var r = (360 / text.length) * (i);
                        var x = (Math.PI / text.length).toFixed(0) * (i);
                        var y = (Math.PI / text.length).toFixed(0) * (i);
                        span.appendChild(node);
                        span.style.webkitTransform = 'rotateZ(' + r + 'deg) translate3d(' + x + 'px,' + y + 'px,0)';
                        span.style.transform = 'rotateZ(' + r + 'deg) translate3d(' + x + 'px,' + y + 'px,0)';
                        element.appendChild(span);
                    }
                }
            };

            Emblem.init('.grid-profile-round-text p');
        </script>

        <script>
            $(document).ready(function () {
                $(".skill-slider").slick({
                    slidesToShow: 1,
                    slidesToScroll: 1,
                    arrows: false,
                    autoplay: true,
                    infinite: true,
                    autoplaySpeed: 50000
                });
                $(".prev-btn").click(function () {
                    $(".skill-slider").slick("slickPrev");
                });
    
                $(".next-btn").click(function () {
                    $(".skill-slider").slick("slickNext");
                });
                $(".prev-btn").addClass("slick-disabled");
                $(".skill-slider").on("afterChange", function () {
                    if ($(".slick-prev").hasClass("slick-disabled")) {
                        $(".prev-btn").addClass("slick-disabled");
                    } else {
                        $(".prev-btn").removeClass("slick-disabled");
                    }
                    if ($(".slick-next").hasClass("slick-disabled")) {
                        $(".next-btn").addClass("slick-disabled");
                    } else {
                        $(".next-btn").removeClass("slick-disabled");
                    }
                });
                $(".prev-head-btn").click(function () {
                    $(".skill-slider").slick("slickPrev");
                });
    
                $(".next-head-btn").click(function () {
                    $(".skill-slider").slick("slickNext");
                });
                $(".prev-head-btn").addClass("slick-disabled");
                $(".skill-slider").on("afterChange", function () {
                    if ($(".slick-prev").hasClass("slick-disabled")) {
                        $(".prev-head-btn").addClass("slick-disabled");
                    } else {
                        $(".prev-head-btn").removeClass("slick-disabled");
                    }
                    if ($(".slick-next").hasClass("slick-disabled")) {
                        $(".next-head-btn").addClass("slick-disabled");
                    } else {
                        $(".next-head-btn").removeClass("slick-disabled");
                    }
                });
            });
        </script>
