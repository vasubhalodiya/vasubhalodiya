<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .clipboard {
            position: relative;
        }

        .copy-input {
            max-width: 275px;
            width: 100%;
            cursor: pointer;
            background-color: #eaeaeb;
            border: none;
            color: #6c6c6c;
            font-size: 14px;
            border-radius: 5px;
            padding: 15px 45px 15px 15px;
            font-family: 'Montserrat', sans-serif;
        }

        .copy-input:focus {
            outline: none;
        }

        .copy-btn {
            width: 40px;
            background-color: #eaeaeb;
            font-size: 18px;
            padding: 6px 9px;
            border-radius: 5px;
            border: none;
            color: #6c6c6c;
            margin-left: -50px;
            transition: all .4s;
        }

        .copy-btn:hover {
            transform: scale(1.3);
            color: #1a1a1a;
            cursor: pointer;
        }

        .copy-btn:focus {
            outline: none;
        }

        .copied {
            font-family: 'Montserrat', sans-serif;
            width: 100px;
            opacity: 0;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            margin: auto;
            color: #000;
            padding: 15px 15px;
            background-color: #fff;
            border-radius: 5px;
            transition: .4s opacity;
        }
    </style>
</head>

<body>
    <div class="clipboard">
        <input onclick="copy()" class="copy-input" value="hello@vasubhalodiya.dev" id="copyClipboard" readonly>
        <button class="copy-btn" id="copyButton" onclick="copy()"><i class="far fa-copy"></i></button>
    </div>
    <div id="copied-success" class="copied">
        <span>Copied!</span>
    </div>
    <script>
        function copy() {
            let copyText = document.getElementById("copyClipboard");
            let copySuccess = document.getElementById("copied-success");
            // copyText.select();
            // copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);

            copySuccess.style.opacity = "1";
            setTimeout(function () { copySuccess.style.opacity = "0" }, 500);
        }
    </script>
</body>

</html>
